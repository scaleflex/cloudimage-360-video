<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@cloudimage/360-video - React Example</title>
    <style>
      html, body { margin: 0; background: #0d0d10; }
    </style>

    <!-- hls.js (global Hls) — needed for the 4K HLS stream -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
    <!-- Self-contained player bundle (three included) — registers <ci-360-video> -->
    <script src="https://cdn.cloudimage.io/360-video/1.4.3/360-video.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <!-- React via native ESM (no build step) so this runs on the lightweight
         static runtime, instantly. In a real app you'd use JSX +
         `@cloudimage/360-video/react` (see the README). -->
    <script type="module">
      import React from 'https://esm.sh/react@18.2.0';
      import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';

      const e = React.createElement;
      const SRC = 'https://scaleflex.filerobot.com/quqvv_vr-video-sample_auto/hls/video.m3u8';

      function App() {
        return e(
          'main',
          {
            style: {
              maxWidth: 1000,
              margin: '0 auto',
              padding: 24,
              minHeight: '100vh',
              boxSizing: 'border-box',
              background: '#0d0d10',
              color: '#e6e6e8',
              fontFamily: 'system-ui, sans-serif',
            },
          },
          e('h1', null, '@cloudimage/360-video — React example'),
          e('p', null, 'Drag to look around · scroll to zoom · toolbar for play / mute / quality / fullscreen.'),
          // React renders the <ci-360-video> custom element (registered by the CDN script).
          e('ci-360-video', {
            src: SRC,
            autoplay: true,
            muted: true,
            loop: true,
            theme: 'dark',
            style: {
              display: 'block',
              width: '100%',
              aspectRatio: '16 / 9',
              borderRadius: 8,
              overflow: 'hidden',
              background: '#000',
            },
          }),
        );
      }

      createRoot(document.getElementById('root')).render(e(App));
    </script>
  </body>
</html>
