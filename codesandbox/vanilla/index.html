<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@cloudimage/360-video - Vanilla Example</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #0d0d10;
        color: #e6e6e8;
      }
      main {
        max-width: 1000px;
        margin: 0 auto;
        padding: 24px;
      }
      a {
        color: #6ea8fe;
      }
      ci-360-video {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 8px;
        overflow: hidden;
        background: #000;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>@cloudimage/360-video — Vanilla example</h1>
      <p>Drag to look around · scroll to zoom · toolbar for play / mute / quality / fullscreen.</p>

      <ci-360-video
        src="https://scaleflex.filerobot.com/quqvv_vr-video-sample_auto/hls/video.m3u8"
        autoplay
        muted
        loop
        theme="dark"
      ></ci-360-video>
    </main>

    <!-- hls.js (global Hls) — needed for the 4K HLS stream -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
    <!-- Self-contained player bundle (three included) — registers <ci-360-video> -->
    <script src="https://cdn.cloudimage.io/360-video/1.4.1/360-video.min.js"></script>
  </body>
</html>
