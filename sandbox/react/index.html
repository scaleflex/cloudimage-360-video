<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>360° Video Sandbox — React</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 1100px; margin: 32px auto; padding: 0 20px; color: #1a1a2e; }
    a.back { color: #2563eb; text-decoration: none; font-size: 14px; }
    h1 { margin: 8px 0 4px; }
    p.lead { color: #555; margin-top: 0; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin: 20px 0; }
    .controls select, .controls button { font: inherit; padding: 6px 12px; border-radius: 8px; border: 1px solid #d0d0dc; background: #fff; cursor: pointer; }
    .controls button:hover { border-color: #2563eb; }
    .hint { background: #f3f3f8; border-left: 3px solid #2563eb; padding: 10px 14px; border-radius: 6px; font-size: 14px; color: #444; margin-bottom: 16px; }
    .player { width: 100%; aspect-ratio: 16 / 9; border-radius: 12px; overflow: hidden; background: #000; }
    pre#state { background: #1a1a2e; color: #a9e34b; padding: 12px 16px; border-radius: 8px; font-size: 13px; overflow: auto; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
